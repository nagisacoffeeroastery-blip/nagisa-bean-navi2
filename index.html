<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2f432f">
    <meta name="description" content="なぎさ珈琲焙煎所の豆なび。好みに合うコーヒー豆や体験をおすすめします。">
    <title>豆なび | なぎさ珈琲焙煎所</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="app-shell" id="app">
      <section class="hero" aria-labelledby="home-title">
        <img class="brand-logo" src="./assets/images/nagisa_logo_black_transparent.png" alt="なぎさ珈琲焙煎所">
        <h1 id="home-title">豆なび</h1>
        <p class="lead">今日の気分に合う豆、ドリップバッグ、体験を選びます。</p>
        <button class="primary-button" type="button" id="start-button">診断をはじめる</button>
      </section>

      <section class="panel is-hidden" id="quiz-panel" aria-live="polite">
        <div class="progress-row">
          <span id="step-label">質問 1</span>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>
        <h2 id="question-title"></h2>
        <div class="answer-grid" id="answer-grid"></div>
        <button class="text-button" type="button" id="back-button">戻る</button>
      </section>

      <section class="panel is-hidden" id="loading-panel" aria-live="polite">
        <div class="spinner" aria-hidden="true"></div>
        <h2>診断中</h2>
        <p>味わい、飲み方、用途から相性のよい豆を探しています。</p>
      </section>

      <section class="results is-hidden" id="results-panel" aria-live="polite">
        <div class="results-heading">
          <p class="eyebrow">おすすめの豆</p>
          <h2>あなたに合う3つ</h2>
          <button class="text-button" type="button" id="restart-button">もう一度診断</button>
        </div>
        <div class="result-list" id="result-list"></div>
      </section>

      <section class="panel error-panel is-hidden" id="error-panel" role="alert">
        <h2>読み込みに失敗しました</h2>
        <p>通信状況を確認して、もう一度お試しください。</p>
        <button class="primary-button" type="button" id="retry-button">再読み込み</button>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
